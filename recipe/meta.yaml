{% set name = "pyEX" %}
{% set version = "0.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e85c392733aec3717b00d05640bd7efcfc87bf949064a7f31112293fe395c27e

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools <66
  run:
    - python >={{ python_min }}
    - aiohttp >=3.2
    - aiohttp-sse-client >=0.2.0
    - deprecation >=2.0.6
    - ipython >=7.2.0
    - pillow >=5.3.0
    - pandas >=0.22
    - pytz >=2019.1
    - requests >=2.21.0
    - six
    - socketio-client-nexus >=0.7.6
    - sseclient >=0.0.22
    - temporal-cache >=0.1.1

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyEX
    - pyEX.client

about:
  home: http://github.com/timkpaine/pyEX
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Python interface to IEX and IEX cloud APIs
  description: Python interface to IEX and IEX cloud APIs
  dev_url: https://github.com/timkpaine/pyEX

extra:
  recipe-maintainers:
    - timkpaine
